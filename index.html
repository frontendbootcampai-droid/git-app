<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <a href="#">Gemini</a>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Search...">
            <button type="submit">Search</button>
        </div>
        <nav class="nav">
            <ul class="nav-links">
                <li><a href="#">Today's Deals</a></li>
                <li><a href="#">Customer Service</a></li>
                <li><a href="#">Gift Cards</a></li>
                <li><a href="#">Sell</a></li>
                <li><a href="#">Cart</a></li>
            </ul>
        </nav>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>
    <section class="hero-section">
        <div class="hero-image">
            <img src="https://via.placeholder.com/400" alt="Product Image">
        </div>
        <div class="hero-content">
            <h1 class="product-title">Amazing Product Title</h1>
            <p class="product-description">This is a short and catchy description of the amazing product. It highlights the key features and benefits that will make you want to buy it right now!</p>
            <div class="star-rating">
                <span class="star">&#9733;</span>
                <span class="star">&#9733;</span>
                <span class="star">&#9733;</span>
                <span class="star">&#9733;</span>
                <span class="star-empty">&#9733;</span>
                <span>4.0 out of 5 stars</span>
            </div>
            <button class="buy-now-button">Buy Now</button>
        </div>
    </section>
    <script src="main.js"></script>
</body>
</html>
